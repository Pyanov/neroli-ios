name: Neroli
options:
  bundleIdPrefix: com.neroli
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.1"
  createIntermediateGroups: true

packages:
  Pow:
    url: https://github.com/EmergeTools/Pow.git
    from: "1.0.0"
  Wave:
    url: https://github.com/jtrivedi/Wave.git
    from: "0.1.0"
  Vortex:
    url: https://github.com/twostraws/Vortex.git
    from: "1.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: "4.4.0"
  ExyteChat:
    url: https://github.com/exyte/Chat.git
    from: "2.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: "2.3.0"
  PopupView:
    url: https://github.com/exyte/PopupView.git
    from: "3.0.0"
  AnimatedTabBar:
    url: https://github.com/exyte/AnimatedTabBar.git
    from: "1.0.0"
  Shimmer:
    url: https://github.com/markiv/SwiftUI-Shimmer.git
    from: "1.4.0"

targets:
  Neroli:
    type: application
    platform: iOS
    sources:
      - path: Neroli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neroli.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
    dependencies:
      - package: Pow
      - package: Wave
      - package: Vortex
      - package: Lottie
        product: Lottie
      - package: ExyteChat
        product: ExyteChat
      - package: MarkdownUI
        product: MarkdownUI
      - package: PopupView
      - package: AnimatedTabBar
      - package: Shimmer
        product: Shimmer

schemes:
  Neroli:
    build:
      targets:
        Neroli: all
    run:
      config: Debug
    archive:
      config: Release
